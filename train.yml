train:
  loss_weights:
    rot: 1.0
    pos: 1.0
    seq: 1.0
  max_epochs: 100000
  val_freq: 1
  batch_size: 256
  seed: 2022
  max_len: 301
  min_len: 50
  path: ./processed_seq
  early_stop_patience: 50
  max_grad_norm: 100.0
  optimizer:
    type: adam
    lr: 1.e-5
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.8
    patience: 3
    min_lr: 5.e-6